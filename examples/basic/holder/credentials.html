<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VC管理 - デジタルウォレット</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../style.css">
  <script src="../lib/loading.js"></script>
</head>
<body>
  <div class="container py-3">
    <div class="text-center mb-3">
      <h1 class="h2">VC管理アプリ</h1>
    </div>
  </div>
  
  <div class="container">
    <div class="row">
      <div class="col-lg-8 mx-auto">
        
        <!-- 未申請時：申請フォーム -->
        <div id="application-form" class="application-state">
          <div class="card border-0">
            <div class="card-header bg-white border-0">
              <h2 class="h5 mb-0">デジタルVC発行申請</h2>
              <small class="text-muted">本人確認に必要な情報を入力してVCを発行申請してください</small>
            </div>
            <div class="card-body">
              <form>
                <div class="mb-3">
                  <label for="fullName" class="form-label">氏名</label>
                  <input type="text" class="form-control" id="fullName" placeholder="山田 太郎" value="山田 太郎">
                </div>
                
                <div class="mb-3">
                  <label for="birthDate" class="form-label">生年月日</label>
                  <input type="date" class="form-control" id="birthDate" value="1990-05-15">
                </div>
                
                <div class="mb-3">
                  <label for="address" class="form-label">住所</label>
                  <input type="text" class="form-control" id="address" placeholder="東京都千代田区霞が関1-1-1" value="東京都千代田区霞が関1-1-1">
                </div>
                
                <div class="mb-3">
                  <label class="form-label">性別</label>
                  <div class="d-flex gap-3">
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                      <label class="form-check-label" for="male">男性</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                      <label class="form-check-label" for="female">女性</label>
                    </div>
                    <div class="form-check">
                      <input class="form-check-input" type="radio" name="gender" id="other" value="other">
                      <label class="form-check-label" for="other">その他</label>
                    </div>
                  </div>
                </div>
                
                <!-- 申請ボタン -->
                <div class="d-grid gap-2">
                  <button type="button" class="btn btn-dark btn-lg" onclick="submitApplication()">VC発行申請</button>
                  <a href="index.html" class="btn btn-outline-dark">キャンセル</a>
                </div>
              </form>
            </div>
          </div>
        </div>
        
        <!-- 申請済み時：発行済みVC一覧 -->
        <div id="credentials-list" class="application-state" style="display: none;">
          <div class="card border-0">
            <div class="card-header bg-white border-0">
              <h2 class="h5 mb-0">発行済みVC</h2>
            </div>
            <div class="card-body">
              <!-- 実際のVC内容を表示 -->
              <div class="border rounded-3 overflow-hidden shadow-sm d-flex flex-column" style="max-width: 400px; height: 252px;">
                    <!-- カードヘッダー（白背景） -->
                    <div class="px-3 py-2 bg-white border-bottom">
                      <div class="d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 fw-bold">デジタル身分証明書</h6>
                        <small class="text-muted">DID認証機構</small>
                      </div>
                    </div>

                    <!-- カード本体 -->
                    <div class="bg-white p-3 flex-grow-1">
                      <div class="row g-3">
                        <div class="col-6">
                          <div class="mb-2">
                            <small class="text-muted d-block">氏名</small>
                            <span class="fw-semibold" id="vc-name">-</span>
                          </div>
                        </div>
                        <div class="col-6">
                          <div class="mb-2">
                            <small class="text-muted d-block">性別</small>
                            <span class="fw-semibold" id="vc-gender">-</span>
                          </div>
                        </div>
                        <div class="col-6">
                          <div class="mb-2">
                            <small class="text-muted d-block">生年月日</small>
                            <span class="fw-semibold" id="vc-birth">-</span>
                          </div>
                        </div>
                        <div class="col-12">
                          <div class="mb-0">
                            <small class="text-muted d-block">住所</small>
                            <span class="fw-semibold" id="vc-address">-</span>
                          </div>
                        </div>
                      </div>
                    </div>

                    <!-- カードフッター -->
                    <div class="px-3 py-1 bg-light border-top">
                      <div class="d-flex justify-content-between">
                        <small class="text-muted">発行日: 2024-01-15</small>
                        <small class="text-muted">有効期限: 2029-01-14</small>
                        <small class="text-success">✓ 有効</small>
                      </div>
                    </div>
              </div>
            </div>
          </div>

          <!-- フッターボタン -->
          <div class="mt-4">
            <div class="d-grid gap-2">
              <button type="button" class="btn btn-dark btn-lg" onclick="resetApplication()">再申請</button>
              <a href="index.html" class="btn btn-outline-dark">ウォレットに戻る</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
  
  <script>
    async function submitApplication() {
      // フォームデータを取得
      const name = document.getElementById('fullName').value;
      const birth = document.getElementById('birthDate').value;
      const address = document.getElementById('address').value;
      const gender = document.querySelector('input[name="gender"]:checked').nextElementSibling.textContent;

      // VC発行処理をシミュレート（1秒のローディング）
      await showLoadingFor(1000);

      // VC内容を設定
      document.getElementById('vc-name').textContent = name;
      document.getElementById('vc-birth').textContent = new Date(birth).toLocaleDateString('ja-JP');
      document.getElementById('vc-address').textContent = address;
      document.getElementById('vc-gender').textContent = gender;

      // 画面を切り替え
      document.getElementById('application-form').style.display = 'none';
      document.getElementById('credentials-list').style.display = 'block';

      // セッションストレージに状態を保存
      sessionStorage.setItem('applicationSubmitted', 'true');
      sessionStorage.setItem('applicationData', JSON.stringify({name, birth, address, gender}));
    }
    
    async function resetApplication() {
      // 再申請処理のローディング（800ms）
      await showLoadingFor(800);

      // 画面を切り替え
      document.getElementById('credentials-list').style.display = 'none';
      document.getElementById('application-form').style.display = 'block';

      // セッションストレージをクリア
      sessionStorage.removeItem('applicationSubmitted');
      sessionStorage.removeItem('applicationData');
    }
    
    // ページ読み込み時に状態を復元
    window.addEventListener('DOMContentLoaded', function() {
      if (sessionStorage.getItem('applicationSubmitted') === 'true') {
        const data = JSON.parse(sessionStorage.getItem('applicationData') || '{}');
        if (data.name) {
          // VC内容を復元
          document.getElementById('vc-name').textContent = data.name;
          document.getElementById('vc-birth').textContent = new Date(data.birth).toLocaleDateString('ja-JP');
          document.getElementById('vc-address').textContent = data.address;
          document.getElementById('vc-gender').textContent = data.gender;
          
          document.getElementById('application-form').style.display = 'none';
          document.getElementById('credentials-list').style.display = 'block';
        }
      }
    });
  </script>
</body>
</html>
